name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck (error level)
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -S error install.sh verify.sh
